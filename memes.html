<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon/13.ico?v=20240626" type="image/x-icon">
  <meta name="description" content="爱播整活图集 —— 鬼畜表情包与整活影像合集，社区投稿，勿令上升。">
  <meta property="og:type" content="website">
  <meta property="og:title" content="爱播整活办 · 鬼畜图集">
  <meta property="og:description" content="鬼畜表情包与整活影像合集，社区投稿，勿令上升。(๑•̀ㅂ•́)و✧">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="爱播整活办 · 鬼畜图集">
  <meta name="twitter:description" content="鬼畜表情包与整活影像合集，社区投稿，勿令上升。">
  <title>爱播整活办 | 鬼畜图集</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --p: #1a8a74;
      --bg: #f5f4f1;
      --card: rgba(0,0,0,0.02);
      --border: rgba(0,0,0,0.07);
      --border-h: rgba(26,138,116,0.35);
      --serif: 'Noto Serif SC', serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: #1a1918;
      font-family: var(--serif);
      min-height: 100vh;
      padding: 0 0 60px;
      overflow-x: hidden;
    }
    [v-cloak] { display: none; }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse 50% 40% at 15% 10%, rgba(26,138,116,.04) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 85% 85%, rgba(26,138,116,.025) 0%, transparent 70%);
    }

    /* ── NAV ── */
    .nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 36px;
      border-bottom: 1px solid var(--border);
      background: rgba(245,244,241,.92);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 50;
      gap: 12px; flex-wrap: wrap;
    }
    .nav-logo { font-size: 11px; letter-spacing: 4px; color: rgba(26,138,116,.8); font-weight: 300; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-back {
      text-decoration: none; color: rgba(26,25,24,.45);
      font-size: 11px; letter-spacing: 2px;
      border: 1px solid var(--border); padding: 5px 14px; border-radius: 20px;
      transition: .3s;
    }
    .nav-back:hover { border-color: var(--border-h); color: var(--p); }
    .upload-btn {
      background: transparent;
      border: 1px solid rgba(0,201,167,.35);
      color: var(--p);
      padding: 5px 16px; border-radius: 20px;
      cursor: pointer; font-size: 11px;
      font-family: var(--serif); letter-spacing: 2px;
      transition: background .3s, color .3s;
    }
    .upload-btn:hover { background: var(--p); color: #000; }

    /* ── HERO ── */
    .hero { text-align: center; padding: 44px 20px 28px; }
    .hero h1 {
      font-size: 26px; font-weight: 200; letter-spacing: 10px;
      color: #1a1918;
      text-shadow: none;
      margin-bottom: 8px;
    }
    .hero h1 em { font-style: normal; color: var(--p); font-weight: 300; }
    .hero p { font-size: 11px; letter-spacing: 3px; color: rgba(26,25,24,.38); font-weight: 200; }
    .hero-line {
      width: 70px; height: 1px; margin: 18px auto 0;
      background: linear-gradient(90deg, transparent, var(--p), transparent); opacity: .4;
    }

    /* ── GRID ── */
    .fan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 6px;
      max-width: 1200px; margin: 28px auto 0; padding: 0 20px;
    }
    @media (max-width: 600px) {
      .fan-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 4px; }
    }

    /* ── CARD ── */
    .fan-card {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--card);
      cursor: pointer;
      border-radius: 3px;
      transform-style: preserve-3d;
      /* 入场动画 */
      opacity: 0;
      transform: scale(.88) translateY(10px);
      animation: popIn .45s cubic-bezier(.34,1.4,.64,1) forwards;
    }
    @keyframes popIn {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    /* 错开延迟 */
    .fan-card:nth-child(1)  { animation-delay: .04s }
    .fan-card:nth-child(2)  { animation-delay: .08s }
    .fan-card:nth-child(3)  { animation-delay: .12s }
    .fan-card:nth-child(4)  { animation-delay: .16s }
    .fan-card:nth-child(5)  { animation-delay: .20s }
    .fan-card:nth-child(6)  { animation-delay: .24s }
    .fan-card:nth-child(7)  { animation-delay: .28s }
    .fan-card:nth-child(8)  { animation-delay: .32s }
    .fan-card:nth-child(9)  { animation-delay: .36s }
    .fan-card:nth-child(10) { animation-delay: .40s }
    .fan-card:nth-child(11) { animation-delay: .44s }
    .fan-card:nth-child(12) { animation-delay: .48s }
    .fan-card:hover { border-color: var(--border-h); box-shadow: 0 4px 24px rgba(0,0,0,.08); }

    .fan-card img, .fan-card video {
      width: 100%; height: 100%; object-fit: cover; display: block;
      filter: brightness(.78) saturate(.82);
      transition: transform .45s ease, filter .4s ease;
    }
    .fan-card:hover img, .fan-card:hover video {
      transform: scale(1.1);
      filter: brightness(1) saturate(1.1);
    }

    /* 扫光 */
    .fan-card::before {
      content: '';
      position: absolute; top: 0; left: -80%;
      width: 45%; height: 100%;
      background: linear-gradient(105deg, transparent 30%, rgba(0,201,167,.1) 50%, transparent 70%);
      transform: skewX(-15deg); z-index: 2; pointer-events: none;
    }
    .fan-card:hover::before { animation: sweep .65s ease forwards; }
    @keyframes sweep { to { left: 140%; } }

    /* 墨晕 */
    .fan-card::after {
      content: ''; position: absolute; inset: 0; z-index: 1;
      background: rgba(0,201,167,.06);
      opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .fan-card:hover::after { opacity: 1; }

    /* 序号 */
    .card-no {
      position: absolute; bottom: 4px; left: 6px; z-index: 4;
      font-size: 9px; letter-spacing: 1px;
      color: rgba(0,201,167,.5); font-family: monospace;
      opacity: 0; transition: opacity .3s;
    }
    .fan-card:hover .card-no { opacity: 1; }

    /* 视频播放图标 */
    .play-icon {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 26px; height: 26px;
      background: rgba(0,201,167,.75); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      z-index: 4; pointer-events: none;
      transition: transform .3s, box-shadow .3s;
    }
    .play-icon i { color: #000; font-size: 9px; margin-left: 2px; }
    .fan-card:hover .play-icon { transform: translate(-50%,-50%) scale(1.18); box-shadow: 0 0 14px rgba(0,201,167,.5); }

    /* 删除按钮 */
    .del-btn {
      position: absolute; top: 4px; right: 4px; z-index: 10;
      background: rgba(160,30,30,.85); border: none; color: #fff;
      width: 18px; height: 18px; border-radius: 50%;
      cursor: pointer; font-size: 11px; line-height: 1;
      display: none; align-items: center; justify-content: center;
      transition: transform .2s, background .2s;
    }
    .fan-card:hover .del-btn { display: flex; }
    .del-btn:hover { background: #ff2020; transform: scale(1.2) rotate(90deg); }

    /* 入场动画 */

    /* 骨架 */
    .skeleton {
      aspect-ratio: 1/1; border-radius: 3px;
      background: linear-gradient(90deg, #eeede9 25%, #e4e3de 50%, #eeede9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* 空态 */
    .empty { grid-column: 1/-1; text-align: center; padding: 48px; color: rgba(26,25,24,.3); font-size: 13px; letter-spacing: 2px; }

    /* ── 灯箱 ── */
    .lb-mask {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.95);
      backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    .lb-mask img, .lb-mask video {
      max-width: 88vw; max-height: 88vh;
      border-radius: 3px;
      border: 1px solid rgba(0,201,167,.18);
      box-shadow: 0 0 60px rgba(0,0,0,.8), 0 0 24px rgba(0,201,167,.07);
    }
    .lb-close {
      position: fixed; top: 20px; right: 26px;
      font-size: 20px; color: rgba(0,201,167,.4);
      cursor: pointer; z-index: 1001;
      transition: color .2s, transform .3s; font-family: monospace;
    }
    .lb-close:hover { color: var(--p); transform: rotate(90deg); }
    .fade-enter-active, .fade-leave-active { transition: opacity .25s; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }
    .lb-enter-active  { animation: lbZoom .3s cubic-bezier(.34,1.4,.64,1); }
    .lb-leave-active  { animation: lbZoom .2s ease reverse; }
    @keyframes lbZoom { from { transform:scale(.9); opacity:0; } to { transform:scale(1); opacity:1; } }

    /* ── 上传弹窗 ── */
    .modal-mask {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000; backdrop-filter: blur(8px);
    }
    .modal-box {
      background: #ffffff; border: 1px solid rgba(0,0,0,.09);
      border-radius: 4px; padding: 28px;
      width: 400px; max-width: 95vw;
      box-shadow: 0 8px 40px rgba(0,0,0,.12);
    }
    .modal-box h2 { font-size: 13px; font-weight: 300; letter-spacing: 4px; color: #1a1918; margin-bottom: 18px; }
    .modal-box label { display: block; font-size: 10px; letter-spacing: 2px; color: rgba(26,25,24,.45); margin-bottom: 5px; }
    .modal-box input[type=text] {
      width: 100%; background: #f8f7f4; border: 1px solid rgba(0,0,0,.1);
      color: #1a1918; padding: 7px 12px; border-radius: 3px;
      font-size: 13px; font-family: var(--serif); margin-bottom: 14px;
      transition: border-color .2s;
    }
    .modal-box input[type=text]:focus { outline: none; border-color: rgba(26,138,116,.4); }
    .drop-zone {
      border: 1px dashed rgba(0,0,0,.12); border-radius: 3px; padding: 22px 16px;
      text-align: center; color: rgba(26,25,24,.35); cursor: pointer;
      transition: .3s; margin-bottom: 14px;
    }
    .drop-zone.over, .drop-zone:hover { border-color: rgba(26,138,116,.35); color: var(--p); background: rgba(26,138,116,.03); }
    .drop-zone i { font-size: 20px; display: block; margin-bottom: 8px; opacity: .5; }
    .drop-zone span { font-size: 11px; letter-spacing: 2px; }
    .drop-zone .hint { font-size: 9px; color: rgba(26,25,24,.3); margin-top: 5px; letter-spacing: 1px; }
    .preview-box { margin-bottom: 12px; text-align: center; }
    .preview-box img, .preview-box video { max-width: 100%; max-height: 140px; border-radius: 2px; border: 1px solid rgba(0,0,0,.08); }
    .preview-name { font-size: 10px; color: rgba(26,25,24,.4); margin-top: 4px; letter-spacing: 1px; }
    .prog-wrap { height: 2px; background: rgba(0,0,0,.06); border-radius: 1px; margin-bottom: 12px; overflow: hidden; }
    .prog-bar { height: 2px; background: linear-gradient(90deg, var(--p), #00ffd5); transition: width .3s; }
    .err { font-size: 10px; color: #804040; margin-bottom: 10px; letter-spacing: 1px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      background: transparent; border: 1px solid rgba(0,0,0,.1); color: rgba(26,25,24,.5);
      padding: 6px 16px; border-radius: 3px; cursor: pointer;
      font-size: 11px; font-family: var(--serif); letter-spacing: 1px; transition: .2s;
    }
    .btn-cancel:hover { color: #1a1918; }
    .btn-submit {
      background: rgba(0,201,167,.1); color: var(--p);
      border: 1px solid rgba(0,201,167,.3); padding: 6px 18px;
      border-radius: 3px; cursor: pointer; font-size: 11px;
      font-family: var(--serif); letter-spacing: 1px; transition: .25s;
    }
    .btn-submit:hover { background: var(--p); color: #000; }
    .btn-submit:disabled { opacity: .25; cursor: not-allowed; }
    .modal-enter-active { animation: slideUp .3s cubic-bezier(.34,1.3,.64,1); }
    .modal-leave-active { animation: slideUp .2s ease reverse; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── Toast ── */
    .toast-wrap { position: fixed; top: 18px; right: 18px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast {
      display: flex; align-items: center; gap: 8px;
      background: #ffffff; border: 1px solid rgba(0,0,0,.08);
      border-left: 2px solid var(--tc, var(--p));
      padding: 8px 14px; font-size: 11px; color: rgba(26,25,24,.65);
      letter-spacing: 1px; min-width: 180px;
      box-shadow: 0 4px 18px rgba(0,0,0,.1); pointer-events: all;
    }
    .toast.error { --tc: #804040; }
    .toast i { font-size: 11px; color: var(--tc); flex-shrink: 0; }
    .toast-enter-active { animation: toastIn .3s cubic-bezier(.34,1.4,.64,1); }
    .toast-leave-active { animation: toastIn .2s ease reverse; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    /* ── Footer ── */
    .footer { text-align: center; margin-top: 48px; font-size: 10px; letter-spacing: 3px; color: rgba(26,25,24,.28); font-weight: 200; }
  </style>
</head>
<body>
<div id="app" v-cloak>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-logo">AIBO · 整活档案</div>
    <div class="nav-right">
      <a class="nav-back" href="index.html">← 返回主站</a>
      <button class="upload-btn" @click="showModal=true">＋ 投稿</button>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <h1>爱播<em>鬼畜</em>图集</h1>
    <p>单纯整活，勿令上升 &nbsp;·&nbsp; (๑•̀ㅂ•́)و✧</p>
    <div class="hero-line"></div>
  </div>

  <!-- GRID -->
  <div class="fan-grid">
    <template v-if="loading">
      <div class="skeleton" v-for="n in 12" :key="'sk'+n"></div>
    </template>
    <template v-else>
      <div v-if="!items.length" class="empty">此处空空，等你来填</div>
      <div v-for="item in items" :key="item.id"
        class="fan-card"
        @click="openLb(item)">

        <template v-if="item.type==='video'">
          <video :src="item.url" muted loop preload="metadata"
            @mouseenter="e=>e.target.play()"
            @mouseleave="e=>{e.target.pause();e.target.currentTime=0}">
          </video>
          <div class="play-icon"><i class="fa fa-play"></i></div>
        </template>
        <img v-else :src="item.url" loading="lazy" alt="">

        <span class="card-no">{{ String(item._idx).padStart(2,'0') }}</span>
        <button v-if="!item.builtin" class="del-btn" @click.stop="deleteItem(item)">&times;</button>
      </div>
    </template>
  </div>

  <div class="footer">整活自留地 · 岁月静好</div>

  <!-- 灯箱 -->
  <transition name="fade">
    <div v-if="lb.show" class="lb-mask" @click.self="closeLb">
      <span class="lb-close" @click="closeLb">✕</span>
      <transition name="lb" mode="out-in">
        <video v-if="lb.type==='video'" :key="lb.url" :src="lb.url" controls autoplay></video>
        <img   v-else :key="lb.url" :src="lb.url" alt="">
      </transition>
    </div>
  </transition>

  <!-- 上传弹窗 -->
  <transition name="fade">
    <div v-if="showModal" class="modal-mask" @click.self="closeModal">
      <transition name="modal">
        <div class="modal-box">
          <h2>投 · 稿</h2>
          <label>标题（可留空）</label>
          <input type="text" v-model="up.title" placeholder="为此帧命名…" maxlength="30">

          <div class="drop-zone" :class="{'over':up.dragging}"
            @click="$refs.fi.click()"
            @dragover.prevent="up.dragging=true"
            @dragleave="up.dragging=false"
            @drop.prevent="onDrop">
            <i class="fa fa-cloud-upload"></i>
            <span>点击或拖拽文件至此</span>
            <div class="hint">图片 JPG/PNG/GIF/WEBP · 视频 MP4/WEBM · 视频 ≤ 25MB</div>
          </div>
          <input type="file" ref="fi" accept="image/*,video/mp4,video/webm" style="display:none" @change="onFile">

          <div class="preview-box" v-if="up.preview">
            <video v-if="up.isVideo" :src="up.preview" muted></video>
            <img   v-else :src="up.preview" alt="">
            <div class="preview-name">{{ up.name }}（{{ up.kb }} KB）</div>
          </div>
          <div class="prog-wrap" v-if="up.prog>0">
            <div class="prog-bar" :style="{width:up.prog+'%'}"></div>
          </div>
          <div class="err" v-if="up.err">{{ up.err }}</div>

          <div class="modal-actions">
            <button class="btn-cancel" @click="closeModal">取消</button>
            <button class="btn-submit" :disabled="!up.file||up.busy" @click="submit">
              {{ up.busy?'上传中…':'确认投稿' }}
            </button>
          </div>
        </div>
      </transition>
    </div>
  </transition>

  <!-- Toast -->
  <div class="toast-wrap">
    <transition-group name="toast">
      <div v-for="t in toasts" :key="t.id" class="toast" :class="t.type">
        <i :class="t.type==='error'?'fa fa-times':'fa fa-leaf'"></i>{{ t.msg }}
      </div>
    </transition-group>
  </div>

</div>

<script>
const { createApp, ref, reactive, onMounted, onUnmounted } = Vue;
const { createClient } = supabase;

const sb = createClient(
  'https://jrhpeyqzntpmnzerhuil.supabase.co',
  'sb_publishable_3yfGRhVBH2R99InGyyrDcQ_s1PyI4PZ'
);
const BUCKET = 'memes', TABLE = 'meme_items';

const BUILTIN = [
  { id:'b0',  type:'image', url:'./images3/anchor1.png', builtin:true },
  { id:'b1',  type:'image', url:'./images3/anchor2.png', builtin:true },
  { id:'b2',  type:'image', url:'./images3/anchor3.png', builtin:true },
  { id:'b3',  type:'image', url:'./images3/anchor4.png', builtin:true },
  { id:'b4',  type:'image', url:'./images3/anchor5.png', builtin:true },
  { id:'b5',  type:'image', url:'./images3/anchor6.png', builtin:true },
  { id:'b6',  type:'image', url:'./images3/gay1.png',    builtin:true },
  { id:'b7',  type:'image', url:'./images3/gay2.png',    builtin:true },
  { id:'b8',  type:'image', url:'./images3/gay3.png',    builtin:true },
  { id:'b9',  type:'image', url:'./images3/gay4.png',    builtin:true },
  { id:'b10', type:'image', url:'./images3/gay5.png',    builtin:true },
  { id:'b11', type:'image', url:'./images3/gay6.png',    builtin:true },
];

createApp({
  setup() {
    const loading = ref(true);
    const items   = ref([]);
    const showModal = ref(false);
    const toasts  = ref([]);
    const lb = reactive({ show:false, url:'', type:'image' });
    const fi = ref(null);
    const up = reactive({ file:null, title:'', isVideo:false, preview:'', name:'', kb:0, dragging:false, busy:false, prog:0, err:'' });
    let channel = null;

    // 序号
    function reindex(arr) {
      arr.forEach((it,i) => it._idx = i+1);
      return arr;
    }

    async function load() {
      // 内置图立即显示
      items.value = reindex(BUILTIN.map(b=>({...b})));
      loading.value = false;
      // 异步追加用户投稿
      try {
        const { data, error } = await sb.from(TABLE).select('*').eq('builtin', false).order('ts', { ascending: false });
        if (!error && data?.length) {
          items.value = reindex([...BUILTIN.map(b=>({...b})), ...data]);
        }
      } catch(e) { console.warn('load:', e); toast('无法连接到数据库，仅显示内置图集', 'error'); }
    }

    function sub() {
      channel = sb.channel('meme_rt')
        .on('postgres_changes', { event:'INSERT', schema:'public', table:TABLE }, p => {
          const n = p.new;
          if (!items.value.some(i => i.id === n.id)) {
            items.value = reindex([...items.value, n]);
            toast(`「${n.title||'新内容'}」已入集`);
          }
        })
        .on('postgres_changes', { event:'DELETE', schema:'public', table:TABLE }, p => {
          items.value = reindex(items.value.filter(i => i.id !== p.old.id));
        })
        .subscribe();
    }

    function toast(msg, type='success') {
      const id = Date.now();
      toasts.value.push({ id, msg, type });
      setTimeout(() => { toasts.value = toasts.value.filter(t=>t.id!==id); }, 3000);
    }

    function openLb(item) {
      lb.url = item.url; lb.type = item.type; lb.show = true;
    }
    function closeLb() { lb.show = false; }

    async function deleteItem(item) {
      if (!confirm('确认删除？')) return;
      const { error } = await sb.from(TABLE).delete().eq('id', item.id);
      if (error) { toast('删除失败','error'); return; }
      if (item.storage_path) await sb.storage.from(BUCKET).remove([item.storage_path]);
      items.value = reindex(items.value.filter(i => i.id !== item.id));
      toast('已移除');
    }

    function resetUp() {
      Object.assign(up, { file:null, title:'', isVideo:false, preview:'', name:'', kb:0, dragging:false, busy:false, prog:0, err:'' });
    }
    function closeModal() { showModal.value = false; resetUp(); }

    function handleFile(file) {
      up.err = '';
      const isImg = file.type.startsWith('image/');
      const isVid = file.type.startsWith('video/');
      if (!isImg && !isVid) { up.err = '仅支持图片或视频'; return; }
      if (isVid && file.size > 25*1024*1024) { up.err = `视频超过 25MB（当前 ${(file.size/1024/1024).toFixed(1)}MB）`; return; }
      up.file = file; up.isVideo = isVid;
      up.name = file.name; up.kb = (file.size/1024).toFixed(0);
      up.preview = URL.createObjectURL(file);
    }
    function onFile(e) { if (e.target.files[0]) handleFile(e.target.files[0]); }
    function onDrop(e) { up.dragging = false; if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }

    async function submit() {
      if (!up.file) return;
      up.busy = true; up.prog = 20; up.err = '';
      const ext = up.file.name.split('.').pop();
      const path = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const { error: upErr } = await sb.storage.from(BUCKET).upload(path, up.file);
      if (upErr) { up.err = '上传失败：' + upErr.message; up.busy = false; return; }
      up.prog = 65;
      const { data: urlData } = sb.storage.from(BUCKET).getPublicUrl(path);
      const title = up.title.trim() || (up.isVideo ? '影像' : '图帧') + ' ' + new Date().toLocaleDateString('zh-CN');
      const { data: row, error: dbErr } = await sb.from(TABLE).insert([{
        title, type: up.isVideo ? 'video' : 'image',
        url: urlData.publicUrl, storage_path: path,
        builtin: false, ts: Date.now()
      }]).select().single();
      if (dbErr) { up.err = '保存失败：' + dbErr.message; up.busy = false; return; }
      up.prog = 100;
      items.value = reindex([...items.value, row]);
      toast(`「${title}」已入集`);
      setTimeout(closeModal, 300);
    }

    onMounted(() => { load(); sub(); });
    onUnmounted(() => { if (channel) sb.removeChannel(channel); });

    // ESC 关灯箱
    const onKey = e => { if (e.key==='Escape') closeLb(); };
    onMounted(() => window.addEventListener('keydown', onKey));
    onUnmounted(() => window.removeEventListener('keydown', onKey));

    return { loading, items, showModal, lb, up, fi, toasts, openLb, closeLb, deleteItem, closeModal, onFile, onDrop, submit };
  }
}).mount('#app');
</script>
</body>
</html>
