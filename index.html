<body class="main-site">

  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo"><i class="fa fa-star"></i><span>卡提希娅的星光小站</span></div>
      <ul class="nav-menu">
        <li class="nav-item"><a href="#home" class="nav-link">首页</a></li>
        <li class="nav-item"><a href="#about" class="nav-link">角色设定</a></li>

  <!-- 控制面板 -->
  <div class="control-panel">
    <h3><i class="fa fa-sliders"></i> 个性化设置</h3>
    <button class="control-btn" onclick="switchTheme('purple')">银紫色主题</button>
    <button class="control-btn" onclick="switchTheme('blue')">冰蓝色主题</button>
    <input type="color" id="customColorPicker">
    <button class="control-btn" onclick="applyCustomTheme()">应用</button>
    <button class="control-btn" onclick="toggleDarkMode()">深色模式</button>
  </div>

  <!-- 首页 -->
  <section id="home" class="home-section section-animate">
    <div class="home-container">
      <img src="1.jpg" class="carterthyia-avatar">

      <p class="character-desc">温柔使者 · 双形态战斗达人</p>
      <a href="aemeath.html" class="btn">进入爱弥斯</a>
