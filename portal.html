<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鸣潮双站入口 | 卡提希娅 & 爱弥斯</title>
  <link rel="icon" href="favicon/13.ico" type="image/x-icon">
  <style>
    :root {
      --bg-a: #061126;
      --bg-b: #1e2f50;
      --card: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.2);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent-a: #7dd3fc;
      --accent-b: #c4b5fd;
      --btn-a: #22d3ee;
      --btn-b: #3b82f6;
      --btn-c: #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -10%, #2b5aa844, transparent 70%),
        radial-gradient(900px 500px at 90% 0%, #7c3aed30, transparent 70%),
        linear-gradient(150deg, var(--bg-a), var(--bg-b));
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, #000 30%, transparent 100%);
      z-index: -2;
    }
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(6px);
      opacity: 0.45;
      z-index: -1;
      animation: float 9s ease-in-out infinite;
    }
    .orb.a {
      width: 240px;
      height: 240px;
      left: -40px;
      top: 120px;
      background: radial-gradient(circle, #38bdf8aa, transparent 70%);
    }
    .orb.b {
      width: 280px;
      height: 280px;
      right: -60px;
      bottom: 100px;
      background: radial-gradient(circle, #a78bfaaa, transparent 70%);
      animation-delay: -3s;
    }
    .orb.c {
      width: 180px;
      height: 180px;
      right: 25%;
      top: 45%;
      background: radial-gradient(circle, #22d3ee66, transparent 70%);
      animation-delay: -6s;
    }
    .wrap {
      width: min(1100px, 92%);
      margin: 48px auto 26px;
      flex: 1;
    }
    .hero {
      text-align: center;
      margin-bottom: 34px;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.8s ease forwards;
    }
    .hero-badge {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 12px;
      font-size: 12px;
      letter-spacing: 1px;
      color: #e2e8f0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
    }
    .hero h1 {
      font-size: clamp(28px, 4vw, 42px);
      margin-bottom: 10px;
      letter-spacing: 1px;
      text-shadow: 0 0 18px rgba(56, 189, 248, 0.35);
    }
    .hero p {
      color: var(--muted);
      font-size: clamp(14px, 2vw, 18px);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 420px;
      position: relative;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 0.9s ease forwards;
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    }
    .card:nth-child(2) {
      animation-delay: 0.18s;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.16) 48%, transparent 58%);
      transform: translateX(-120%);
      transition: transform 0.7s ease;
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 20px 38px rgba(7, 16, 35, 0.45);
    }
    .card:hover::after {
      transform: translateX(120%);
    }
    .thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-bottom: 1px solid var(--line);
    }
    .content {
      padding: 18px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }
    .content h2 {
      font-size: 24px;
    }
    .content p {
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }
    .btn {
      display: inline-block;
      text-align: center;
      text-decoration: none;
      color: #fff;
      border-radius: 10px;
      padding: 12px 14px;
      font-weight: 600;
      transition: transform 0.25s ease, opacity 0.25s ease, box-shadow 0.25s ease;
    }
    .btn:hover { transform: translateY(-2px); opacity: 0.97; box-shadow: 0 12px 20px rgba(11, 28, 63, 0.45); }
    .btn-carter { background: linear-gradient(135deg, var(--btn-c), var(--btn-b)); }
    .btn-aimisi { background: linear-gradient(135deg, var(--btn-a), var(--btn-b)); }
    .quick-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 22px;
      opacity: 0;
      transform: translateY(10px);
      animation: rise 0.8s ease forwards;
      animation-delay: 0.35s;
    }
    .chip {
      color: #e2e8f0;
      text-decoration: none;
      border: 1px solid var(--line);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      background: rgba(255,255,255,0.05);
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .chip:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.32);
    }
    footer {
      text-align: center;
      color: var(--muted);
      padding: 10px 16px 22px;
      font-size: 13px;
    }
    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .wrap { margin-top: 28px; }
    }
  </style>
</head>
<body>
  <div class="orb a" aria-hidden="true"></div>
  <div class="orb b" aria-hidden="true"></div>
  <div class="orb c" aria-hidden="true"></div>

  <main class="wrap">
    <section class="hero">
      <span class="hero-badge">PORTAL / 双站专题入口</span>
      <h1>鸣潮角色双站入口</h1>
      <p>在不改动卡提希娅站点的基础上，整合卡提希娅与爱弥斯两套专题页面。</p>
    </section>

    <section class="grid" aria-label="站点入口列表">
      <article class="card">
        <img class="thumb" src="images/1.jpg" alt="卡提希娅站点缩略图">
        <div class="content">
          <h2>卡提希娅站</h2>
          <p>星光主题角色站，包含角色设定、故事背景、攻略、图库与实机演示内容。</p>
          <a class="btn btn-carter" href="index.html">进入卡提希娅站</a>
        </div>
      </article>

      <article class="card">
        <img class="thumb" src="images2/1.jpg" alt="爱弥斯站点缩略图">
        <div class="content">
          <h2>爱弥斯站</h2>
          <p>数据电子风专题页，包含角色档案、技能演示视频和视觉图集。</p>
          <a class="btn btn-aimisi" href="index2.html">进入爱弥斯站</a>
        </div>
      </article>
    </section>

    <section class="quick-links" aria-label="快速入口">
      <a class="chip" href="index.html#home">卡提希娅首页</a>
      <a class="chip" href="index.html#gallery">卡提希娅图库</a>
      <a class="chip" href="index2.html#video">爱弥斯演示</a>
      <a class="chip" href="index2.html#gallery">爱弥斯图集</a>
    </section>
  </main>

  <footer>
    <p>© 2026 鸣潮角色站聚合入口 | Version 1.1</p>
  </footer>
</body>
</html>
