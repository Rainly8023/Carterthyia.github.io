<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>The Journey | 旅行日记</title>
  <style>
    body { background: #fdfdfd; color: #222; margin: 0; font-family: "Helvetica Neue", sans-serif; }
    .header { padding: 100px 50px; text-align: center; }
    .header h2 { font-weight: 200; font-size: 40px; letter-spacing: 8px; margin: 0; }
    .header p { color: #999; margin-top: 10px; font-size: 13px; }

    .gallery { max-width: 1400px; margin: 0 auto; display: flex; flex-wrap: wrap; padding: 20px; }
    .photo-card { width: calc(33.33% - 40px); margin: 20px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: .3s; }
    .photo-card:hover { transform: translateY(-10px); }
    .photo-card img { width: 100%; height: 300px; object-fit: cover; }
    .photo-info { padding: 20px; text-align: center; }
    .photo-info h4 { margin: 0; font-size: 16px; color: #333; }
    .photo-info span { font-size: 12px; color: #bbb; display: block; margin-top: 5px; }

    .back { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: #00c9a7; color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 50%; text-decoration: none; box-shadow: 0 5px 15px rgba(0,201,167,0.4); }
  </style>
</head>
<body>
  <div class="header">
    <h2>THE JOURNEY</h2>
    <p>步履不停 · 记录走过的每一寸土地</p>
  </div>

  <div class="gallery">
    <div class="photo-card">
      <img src="images/malaysia.jpg">
      <div class="photo-info">
        <h4>马来西亚</h4>
        <span>Apr 2024</span>
      </div>
    </div>
    <div class="photo-card">
      <img src="images/singapore.jpg">
      <div class="photo-info">
        <h4>新加坡</h4>
        <span>Dec 2023</span>
      </div>
    </div>
  </div>

  <a href="index.html" class="back">←</a>
</body>
</html>
