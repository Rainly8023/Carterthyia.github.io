<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>加载中...</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo"><i class="fa fa-home"></i> 返回主站</a>
    </div>
  </nav>

  <section class="hero-section">
    <div class="profile-card card-animate">
      <div class="avatar-wrapper">
        <img id="userAvatar" src="" alt="头像" class="avatar-img">
      </div>
      <h1 class="site-title">爱弥斯</h1>
      <p class="site-description">正在加载星海资料...</p>
    </div>
  </section>

  <section class="video-section">
    <div class="video-container">
      <video id="smallVideo" controls></video>
      <video id="bigVideo" class="hidden" controls></video>
    </div>
  </section>

  <section class="gallery-section">
    <h2 class="section-title">幻梦展柜</h2>
    <div class="gallery-grid">
      <img src="images/P2.png" class="gallery-img card-animate">
      <img src="images/P3.png" class="gallery-img card-animate">
      <img src="images/P4.png" class="gallery-img card-animate">
      <img src="images/P5.png" class="gallery-img card-animate">
      <img src="images/P6.png" class="gallery-img card-animate">
      <img src="images/P7.png" class="gallery-img card-animate">
      <img src="images/P8.png" class="gallery-img card-animate">
    </div>
  </section>

  <button class="back-to-top hidden"><i class="fa fa-arrow-up"></i></button>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
